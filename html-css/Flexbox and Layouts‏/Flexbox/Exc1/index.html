<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <p>4 boxes evenly distributed</p>
        <div class="parent" id="evenly">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
        </div>
    </div>
    <div>
        <p>2 boxes (2 and 3) are twice as big as the first</p>
        <div class="parent" id="not-evenly">
            <div class="box small">1</div>
            <div class="box big">2</div>
            <div class="box big">3</div>
        </div>
    </div>
</body>
</html>

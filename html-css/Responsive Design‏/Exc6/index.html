<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex justify-center items-center min-h-screen bg-gradient-to-r from-[#5b6ee1] to-[#8f1bdd] font-sans m-0 p-4">   
    <div class="flex flex-col md:flex-row max-w-sm md:max-w-2xl w-full bg-white rounded-xl shadow-xl overflow-hidden">
        <div class="flex-1 flex justify-center items-center bg-gradient-to-br from-[#4158d0] to-[#c850c0] h-48 md:h-auto md:self-stretch">            
            <div class="w-14 h-14 bg-white/30 rounded-full flex justify-center items-center text-2xl">
                📷
            </div>
        </div>  
        <div class="flex-1 p-6 md:p-8 flex flex-col justify-between text-center md:text-left">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Premium Laptop</h1>
            <p class="text-sm text-gray-500 leading-relaxed mb-6">
                High-performance laptop perfect for developers and designers. Features the latest processor, ample RAM, and a stunning display that brings your work to life.
            </p>
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-2xl font-bold text-red-500">$1,299</h2>
                <button class="w-full md:w-auto bg-gradient-to-r from-[#5b6ee1] to-[#8f1bdd] text-white px-6 py-2 rounded-lg font-semibold shadow-md hover:opacity-90 transition">
                    Add to Cart
                </button>
            </div>
        </div>
    </div>
</body>
</html>

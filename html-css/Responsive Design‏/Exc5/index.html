<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="product-pic">
            <div class="dot">
                <p>📷</p>
            </div>
        </div>
        <div class="product-details">
            <h1 class="title">Laptop</h1>
            <p class="description">High-performance laptop perfect for developers and designers. Features the latest processor, ample RAM, and a stunning display that brings your work to life.</p>
            <div class="row">
                <h2 class="price">1,299$</h2>
                <button class="button" id="add">Add to Cart</button>
            </div>
        </div>
    </div>
</body>
</html>
